<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>即時新聞聚合器 | Guardian · CNN · BBC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0053A0 0%, #00A1E0 100%);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px 35px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }
        
        h1 {
            color: #004E8C;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .badge {
            background: linear-gradient(135deg, #0053A0, #00A1E0);
            color: white;
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 20px;
        }
        
        .source-tags {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        
        .source-tag {
            background: #f0f0f0;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .source-tag.guardian { background: #0053A0; color: white; }
        .source-tag.cnn { background: #cc0000; color: white; }
        .source-tag.bbc { background: #000000; color: white; }
        
        .live-badge {
            display: inline-block;
            background: #e74c3c;
            color: white;
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 12px;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        .music-control {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }
        
        .sound-btn {
            background: linear-gradient(135deg, #0053A0, #00A1E0);
            color: white;
            padding: 10px 24px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .sound-btn:hover {
            transform: scale(1.05);
        }
        
        .music-status {
            font-size: 13px;
            color: #666;
            background: #f0f0f0;
            padding: 5px 12px;
            border-radius: 20px;
        }
        
        .comment-box {
            background: #e8f4f8;
            border-left: 5px solid #0053A0;
            padding: 18px 25px;
            margin-bottom: 30px;
            border-radius: 15px;
        }
        
        .comment-box h3 {
            color: #0053A0;
            margin-bottom: 10px;
        }
        
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .news-card {
            background: white;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
        }
        
        .news-card:hover {
            transform: translateY(-8px);
        }
        
        .image-container {
            height: 220px;
            overflow: hidden;
            cursor: pointer;
        }
        
        .news-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.35s;
        }
        
        .image-container:hover .news-image {
            transform: scale(1.12);
        }
        
        .image-container.zoomed .news-image {
            transform: scale(1.35);
        }
        
        .news-content {
            padding: 20px;
        }
        
        .news-title {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 12px;
            line-height: 1.4;
        }
        
        .news-title a {
            color: #2c3e50;
            text-decoration: none;
        }
        
        .news-title a:hover {
            color: #0053A0;
        }
        
        .news-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }
        
        .news-source {
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 15px;
            display: inline-block;
        }
        
        .news-source.guardian { background: #e3f0f5; color: #0053A0; }
        .news-source.cnn { background: #ffe6e6; color: #cc0000; }
        .news-source.bbc { background: #e6e6e6; color: #000000; }
        
        .news-summary {
            color: #666;
            font-size: 0.85rem;
            line-height: 1.4;
            margin-top: 10px;
        }
        
        .spellcheck-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
        }
        
        .spellcheck-form {
            display: flex;
            gap: 12px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .spellcheck-input {
            flex: 1;
            min-width: 200px;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            font-size: 16px;
            outline: none;
        }
        
        .spellcheck-input:focus {
            border-color: #0053A0;
        }
        
        .spellcheck-btn {
            padding: 14px 30px;
            background: linear-gradient(135deg, #0053A0, #00A1E0);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
        }
        
        .spellcheck-result {
            margin-top: 20px;
            padding: 16px 20px;
            border-radius: 14px;
            display: none;
        }
        
        .spellcheck-result.show {
            display: block;
        }
        
        .result-correct {
            background: #d4edda;
            border-left: 5px solid #28a745;
        }
        
        .result-incorrect {
            background: #f8d7da;
            border-left: 5px solid #dc3545;
        }
        
        .loading {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 20px;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0053A0;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .footer-info {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            color: rgba(255, 255, 255, 0.9);
        }
        
        .timestamp {
            background: rgba(0, 0, 0, 0.2);
            display: inline-block;
            padding: 8px 20px;
            border-radius: 30px;
        }
        
        .refresh-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            margin-left: 12px;
        }
        
        @media (max-width: 768px) {
            .news-grid {
                grid-template-columns: 1fr;
            }
            .image-container {
                height: 180px;
            }
            h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>
                CISC3016 Project 
                <span class="badge">Guardian · CNN · BBC</span>
                <span class="live-badge" id="liveBadge">LIVE</span>
            </h1>
            <div class="source-tags">
                <span class="source-tag guardian">The Guardian 衛報</span>
                <span class="source-tag cnn">CNN 科技</span>
                <span class="source-tag bbc">BBC 新聞</span>
            </div>
            
            <div class="music-control">
                <button class="sound-btn" id="playSoundBtn">🎵 播放背景音樂</button>
                <span class="music-status" id="musicStatus">⏸ 未播放</span>
            </div>
            <audio id="bgAudio" preload="auto" loop>
                <source src="sound1.mp3" type="audio/mpeg">
            </audio>
        </header>
        
        <div class="comment-box">
            <h3>🤖 AI 即時分析</h3>
            <div id="randomComment">正在分析即時新聞...</div>
        </div>
        
        <div class="news-grid" id="newsGrid">
            <div class="loading">
                <div class="spinner"></div>
                <p>🔄 正在從 Guardian、CNN、BBC 爬取即時新聞...</p>
            </div>
        </div>
        
        <div class="spellcheck-section">
            <h3>📝 拼字檢查</h3>
            <div class="spellcheck-form">
                <input type="text" id="spellWord" class="spellcheck-input" placeholder="請輸入英文單字...">
                <button id="checkSpellingBtn" class="spellcheck-btn">🔍 檢查拼字</button>
            </div>
            <div id="spellResult" class="spellcheck-result"></div>
        </div>
        
        <div class="footer-info">
            <div class="timestamp" id="timestamp">📡 等待連接後端...</div>
            <button class="refresh-btn" id="manualRefreshBtn">🔄 手動刷新</button>
        </div>
    </div>
    
    <script>
        let isPlaying = false;
        let isLoading = false;
        
        const audio = document.getElementById('bgAudio');
        const playBtn = document.getElementById('playSoundBtn');
        const musicStatus = document.getElementById('musicStatus');
        
        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                playBtn.innerHTML = '🎵 播放背景音樂';
                musicStatus.innerHTML = '⏸ 未播放';
                isPlaying = false;
            } else {
                audio.play().then(() => {
                    playBtn.innerHTML = '⏸ 暫停音樂';
                    musicStatus.innerHTML = '🎵 播放中...';
                    isPlaying = true;
                }).catch(() => {
                    musicStatus.innerHTML = '⚠️ 播放失敗';
                });
            }
        });
        
        async function fetchNews() {
            if (isLoading) return;
            isLoading = true;
            
            const grid = document.getElementById('newsGrid');
            grid.innerHTML = '<div class="loading"><div class="spinner"></div><p>🔄 正在爬取即時新聞...</p></div>';
            
            try {
                const response = await fetch('./api/news');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                
                document.getElementById('randomComment').innerHTML = data.randomComment;
                document.getElementById('timestamp').innerHTML = `📅 更新時間: ${new Date(data.timestamp).toLocaleString()} | 耗時: ${data.fetchTime}`;
                renderNews(data.news);
            } catch (error) {
                grid.innerHTML = `<div class="loading"><p style="color:red;">❌ 無法連接後端</p><button onclick="fetchNews()" style="margin-top:15px;padding:8px 20px;border-radius:20px;border:none;background:#0053A0;color:white;cursor:pointer;">🔄 重試</button></div>`;
            } finally {
                isLoading = false;
            }
        }
        
        function getSourceClass(source) {
            if (source.includes('Guardian')) return 'guardian';
            if (source.includes('CNN')) return 'cnn';
            if (source.includes('BBC')) return 'bbc';
            return '';
        }
        
function renderNews(newsItems) {
    const grid = document.getElementById('newsGrid');
    if (!newsItems || newsItems.length === 0) {
        grid.innerHTML = '<div class="loading"><p>暫無新聞</p></div>';
        return;
    }
    
    grid.innerHTML = newsItems.map((item, idx) => `
        <div class="news-card">
            <div class="image-container" data-idx="${idx}">
                <a href="${item.link}" target="_blank" rel="noopener noreferrer" style="display: block; height: 100%;">
                    <img src="${item.image}" class="news-image" onerror="this.src='default-image.jpg'">
                </a>
            </div>
            <div class="news-content">
                <div class="news-meta">
                    <span class="news-source ${getSourceClass(item.source)}">📰 ${item.source}</span>
                    ${item.score ? `<span style="font-size:12px;">⭐ ${item.score}</span>` : ''}
                </div>
                <h3 class="news-title"><a href="${item.link}" target="_blank">${escapeHtml(item.title)}</a></h3>
                ${item.summary ? `<div class="news-summary">📝 ${escapeHtml(item.summary)}</div>` : ''}
                ${item.author ? `<div style="font-size:11px;color:#999;margin-top:8px;">✍️ ${escapeHtml(item.author)}</div>` : ''}
            </div>
        </div>
    `).join('');
    
    setupImageZoom();
}
        
        function setupImageZoom() {
            document.querySelectorAll('.image-container').forEach(container => {
                container.addEventListener('click', function() {
                    this.classList.toggle('zoomed');
                    document.querySelectorAll('.image-container').forEach(other => {
                        if (other !== this && other.classList.contains('zoomed')) {
                            other.classList.remove('zoomed');
                        }
                    });
                });
            });
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        async function checkSpelling() {
            const word = document.getElementById('spellWord').value.trim();
            const resultDiv = document.getElementById('spellResult');
            
            if (!word) {
                resultDiv.className = 'spellcheck-result show';
                resultDiv.innerHTML = '請輸入單字';
                return;
            }
            
            resultDiv.className = 'spellcheck-result show';
            resultDiv.innerHTML = '<div class="spinner" style="width:25px;height:25px;"></div>';
            
            try {
                const response = await fetch(`./api/spellcheck?word=${encodeURIComponent(word)}`);
                const data = await response.json();
                
                if (data.correct) {
                    resultDiv.className = 'spellcheck-result show result-correct';
                    let html = `<strong>✅ ${data.message}</strong>`;
                    if (data.definition) {
                        html += `<div style="margin-top:8px;"><strong>📖 定義：</strong> ${data.definition}</div>`;
                    }
                    resultDiv.innerHTML = html;
                } else {
                    resultDiv.className = 'spellcheck-result show result-incorrect';
                    let html = `<strong>❌ ${data.message}</strong>`;
                    if (data.suggestions) {
                        html += `<div style="margin-top:8px;">💡 建議: ${data.suggestions.join(', ')}</div>`;
                    }
                    resultDiv.innerHTML = html;
                }
            } catch (error) {
                resultDiv.innerHTML = '連線失敗';
            }
        }
        
        document.getElementById('checkSpellingBtn').addEventListener('click', checkSpelling);
        document.getElementById('spellWord').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkSpelling();
        });
        document.getElementById('manualRefreshBtn').addEventListener('click', fetchNews);
        
        fetchNews();
        setInterval(fetchNews, 180000);
    </script>
</body>
</html>
